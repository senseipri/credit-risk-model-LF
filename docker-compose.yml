version: '3.8'

services:
  backend:
    build: .
    container_name: credit-risk-backend
    ports:
      - "8000:8000"

  frontend:
    image: python:3.10-slim
    container_name: credit-risk-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "pip install streamlit requests && streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend